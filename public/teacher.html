<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Panel - Virtual Classroom</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #111214; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { padding: 15px; text-align: center; background: #1a1c20; border-bottom: 1px solid #2a2d32; position: relative; }
        .controls button { padding: 10px 20px; font-size: 14px; border: none; border-radius: 6px; background: #2ea44f; color: white; cursor: pointer; font-weight: bold; margin: 5px; }
        #shareBtn { background: #007fff; }
        #muteAllBtn { background: #ea4335; }
        #unmuteAllBtn { background: #2ea44f; }
        #youtubeStreamBtn { background: #ff0000; color: white; }
        
        .master-chat-btn { position: absolute; right: 20px; top: 22px; padding: 10px 15px; background: #ff9800; color: #000; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .meeting-container { display: flex; flex: 1; height: calc(100vh - 140px); overflow: hidden; position: relative; }
        .sidebar {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 15%; 
            background: #1e1e1e;
        }

        .top-bar {
            flex-shrink: 0;
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        /* Active Participants Header style placement counter layout */
        .counter-header {
            padding: 10px;
            background: #2a2d32;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #2ea44f;
            border-bottom: 1px solid #3e424b;
        }

        .studentgrid {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .studentgrid::-webkit-scrollbar { width: 8px; }
        .studentgrid::-webkit-scrollbar-thumb { background: #666; border-radius: 10px; }
        .studentgrid::-webkit-scrollbar-track { background: #222; }

        .student-card { position: relative; width: 100%; background: #222; border-radius: 8px; border: 2px solid #3e424b; overflow: hidden; margin-bottom: 10px; }
        .student-card video { width: 100%; object-fit: cover; aspect-ratio: 4/3; }
        .student-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 6px; font-size: 11px; border-radius: 4px; }
        
        .mic-control-btn { position: absolute; top: 5px; right: 5px; border: none; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; color: white; transition: 0.2s; z-index: 20; }
        .mic-off { background: #ea4335; } 
        .mic-on { background: #2ea44f; }  
        .hand-raised { background: #ff9800; color: #000; animation: blink 1s infinite; box-shadow: 0 0 10px #ff9800; }

        @keyframes blink { 50% { opacity: 0.4; } }

        .main-display { flex: 1; display: flex; justify-content: center; align-items: center; background: #0e0f11; padding: 2px; position: relative; }
        .main-display video { width: 100%; height: 100%; object-fit: cover; background: #222; border-radius: 12px; }
        .mirror { transform: scaleX(-1); }
        .role-label { position: absolute; top: 35px; left: 45px; background: #2ea44f; padding: 5px 12px; font-weight: bold; border-radius: 6px; z-index: 10; }

        .chat-panel { width: 0; min-width: 0; max-width: 28%; background: #161719; border-left: 0 solid #2a2d32; display: flex; flex-direction: column; transition: 0.3s; overflow: hidden; }
        .chat-panel.open { width: 28%; min-width: 280px; border-left: 1px solid #2a2d32; }
        .chat-header { padding: 15px; background: #1a1c20; font-weight: bold; text-align: center; border-bottom: 1px solid #2a2d32; color: #ff9800; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-block { padding: 8px 12px; border-radius: 6px; max-width: 85%; font-size: 13px; line-height: 1.4; word-break: break-all; }
        .msg-me { background: #007fff; color: #fff; align-self: flex-end; }
        .msg-other { background: #2a2d32; color: #fff; align-self: flex-start; }
        .chat-input-area { padding: 10px; background: #1a1c20; border-top: 1px solid #2a2d32; display: flex; flex-direction: column; gap: 8px; }
        .chat-row { display: flex; gap: 5px; }
        .chat-input-area input[type="text"] { flex: 1; padding: 8px; background: #222; border: 1px solid #3a3f47; border-radius: 4px; color: #fff; outline: none; }
        .chat-input-area button { padding: 8px 15px; background: #2ea44f; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .file-label { display: inline-block; background: #444; text-align: center; padding: 5px; font-size: 11px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .file-link { color: #ff9800; text-decoration: underline; display: block; font-weight: bold; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="meeting-container">
        <div class="sidebar">
            <div class="top-bar">
                <div class="controls" style="margin-top: 10px;">
                    <button id="createBtn">Start & Create Classroom</button>
                    <button id="shareBtn" style="display: none;">Share Screen 🖥️</button>
                    <button id="youtubeStreamBtn" style="display: none;">Stream to YouTube 🎥</button>
                    <button id="muteAllBtn" style="display: none;">Mute All Students 🎙️❌</button>
                    <button id="unmuteAllBtn" style="display: none;">Unmute All Students 🎙️✅</button>
                    <button id="masterChatBtn" style="display: none;">Open Chat Board 💬</button>
                </div>
                <h4 id="roomDisplay" style="color: #aaa; margin-top: 5px;"></h4>
            </div>

            <div id="participantCounter" class="counter-header" style="display: none;">
                Total Class Attendees: 1
            </div>

            <div class="studentgrid" id="studentGrid"></div>
        </div>
        
        <div class="main-display" id="mainArea">
            <video id="localVideo" class="mirror" autoplay playsinline muted></video>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-header">Classroom Sync Chat (Live)</div>
            <div class="chat-messages" id="chatWindow"></div>
            <div class="chat-input-area">
                <div class="chat-row">
                    <input type="text" id="msgInput" placeholder="Type a message...">
                    <button id="sendMsgBtn">Send</button>
                </div>
                <label class="file-label">
                    📁 Share File / Notes (PDF, Image)
                    <input type="file" id="fileInput" style="display: none;">
                </label>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;
        let screenStream;
        let mediaRecorder; 
        let isScreenSharing = false;
        let isLiveStreaming = false;
        let isChatPanelOpen = false;
        const peerConnections = {};
        const studentMicStatus = {}; 
        const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19020' }] };

        const chatPanel = document.getElementById('chatPanel');
        const masterChatBtn = document.getElementById('masterChatBtn');
        const participantCounter = document.getElementById('participantCounter');

        // Function to dynamically update live attendee counter text markup
        function updateCountUI(count) {
            if(count !== undefined) {
                participantCounter.innerText = `Total Class Attendees: ${count}`;
            }
        }

        masterChatBtn.onclick = () => {
            if (!isChatPanelOpen) {
                chatPanel.classList.add('open');
                masterChatBtn.innerText = "Close Chat Board ✖";
                masterChatBtn.style.background = "#ea4335";
                isChatPanelOpen = true;
                socket.emit('toggle-room-chat', { open: true }); 
            } else {
                chatPanel.classList.remove('open');
                masterChatBtn.innerText = "Open Chat Board 💬";
                masterChatBtn.style.background = "#ff9800";
                isChatPanelOpen = false;
                socket.emit('toggle-room-chat', { open: false }); 
            }
        };

        document.getElementById('createBtn').onclick = async function() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            
            const roomId = Math.random().toString(36).substring(2, 9);
            document.getElementById('roomDisplay').innerText = `Class Room ID: ${roomId}`;
            
            socket.emit('join-room', { roomId, role: 'teacher' });
            this.style.display = 'none';
            document.getElementById('shareBtn').style.display = 'inline-block';
            document.getElementById('youtubeStreamBtn').style.display = 'inline-block';
            document.getElementById('muteAllBtn').style.display = 'inline-block';
            document.getElementById('unmuteAllBtn').style.display = 'inline-block';
            masterChatBtn.style.display = 'inline-block';
            participantCounter.style.display = 'block';
        };

        // --- YouTube MediaRecorder Implementation Pipeline ---
        document.getElementById('youtubeStreamBtn').onclick = function() {
            if (!isLiveStreaming) {
                const streamKey = prompt("Please enter your YouTube Stream Key:");
                if (!streamKey) return alert("Stream Key is required to push media live!");

                socket.emit('start-youtube-stream', { streamKey });
            } else {
                socket.emit('stop-youtube-stream');
            }
        };

        socket.on('stream-started', () => {
            isLiveStreaming = true;
            const btn = document.getElementById('youtubeStreamBtn');
            btn.innerText = "Stop YouTube Stream 🛑";
            btn.style.background = "#333";

            // Record either screen share stream or standard local camera output
            const trackingStream = isScreenSharing ? screenStream : localStream;
            
            // Collect chunks into low-latency clusters every 1 second (1000ms timeslices)
            mediaRecorder = new MediaRecorder(trackingStream, {
                mimeType: 'video/webm;codecs=vp8,opus',
                videoBitsPerSecond: 2500000
            });

            mediaRecorder.ondataavailable = async (e) => {
                if (e.data && e.data.size > 0) {
                    socket.emit('stream-chunk', e.data);
                }
            };

            mediaRecorder.start(1000); 
        });

        socket.on('stream-stopped', () => {
            cleanupStreaming();
        });

        socket.on('stream-error', (err) => {
            alert(err);
            cleanupStreaming();
        });

        function cleanupStreaming() {
            isLiveStreaming = false;
            const btn = document.getElementById('youtubeStreamBtn');
            btn.innerText = "Stream to YouTube 🎥";
            btn.style.background = "#ff0000";
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        document.getElementById('sendMsgBtn').onclick = sendTextMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if (e.key === 'Enter') sendTextMessage(); };

        function sendTextMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            const data = { sender: 'Teacher', text: text };
            socket.emit('send-message', data);
            appendMsg(data, 'msg-me');
            input.value = '';
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) return alert("File size must be under 10MB");

            const reader = new FileReader();
            reader.onload = function(evt) {
                const fileData = {
                    sender: 'Teacher',
                    fileName: file.name,
                    fileBuffer: evt.target.result
                };
                socket.emit('share-file', fileData);
                appendFile(fileData, 'msg-me');
            };
            reader.readAsDataURL(file);
        };

        socket.on('receive-message', (data) => { appendMsg(data, 'msg-other'); });
        socket.on('receive-file', (data) => { appendFile(data, 'msg-other'); });

        function appendMsg(data, className) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg-block ${className}`;
            div.innerHTML = `<strong>${data.sender}:</strong> ${data.text}`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function appendFile(data, className) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg-block ${className}`;
            div.innerHTML = `<strong>${data.sender} Shared:</strong> <a class="file-link" href="${data.fileBuffer}" download="${data.fileName}">📁 ${data.fileName}</a>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        document.getElementById('muteAllBtn').onclick = function() { socket.emit('mute-all-students'); };
        document.getElementById('unmuteAllBtn').onclick = function() { socket.emit('unmute-all-students'); };

        document.getElementById('shareBtn').onclick = async function() {
            if (!isScreenSharing) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    
                    for (let userId in peerConnections) {
                        const sender = peerConnections[userId].getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(videoTrack);
                    }
                    
                    const localVideo = document.getElementById('localVideo');
                    localVideo.srcObject = screenStream;
                    localVideo.classList.remove('mirror');
                    
                    this.innerText = "Stop Sharing ❌";
                    this.style.background = "#ea4335";
                    isScreenSharing = true;

                    // If YouTube stream is active, dynamically restart MediaRecorder to grab the new screen layout track elements
                    if (isLiveStreaming && mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                        mediaRecorder = new MediaRecorder(screenStream, { mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 2500000 });
                        mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) socket.emit('stream-chunk', e.data); };
                        mediaRecorder.start(1000);
                    }
                    
                    videoTrack.onended = () => { stopScreenShare(); };
                } catch (error) {
                    console.error("Error starting screen share:", error);
                }
            } else {
                stopScreenShare();
            }
        };

        function stopScreenShare() {
            if (!isScreenSharing) return;
            
            const videoTrack = localStream.getVideoTracks()[0];
            
            for (let userId in peerConnections) {
                const sender = peerConnections[userId].getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
            
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = localStream;
            localVideo.classList.add('mirror');
            
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.innerText = "Share Screen 🖥️";
            shareBtn.style.background = "#007fff";
            
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
            }
            
            isScreenSharing = false;

            // Revert YouTube stream pipeline recorder framework back to target original local webcam capture configurations
            if (isLiveStreaming && mediaRecorder) {
                mediaRecorder.stop();
                mediaRecorder = new MediaRecorder(localStream, { mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 2500000 });
                mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) socket.emit('stream-chunk', e.data); };
                mediaRecorder.start(1000);
            }
        }

        // Handle Active Room Counter sync packets
        socket.on('all-users', ({ users, count }) => {
            updateCountUI(count);
            users.forEach(user => { if (user.role === 'student') createPeerConnection(user.id); });
        });

        socket.on('user-joined', ({ userId, role, count }) => {
            updateCountUI(count);
            if (role === 'student') {
                const pc = createPeerConnection(userId);
                initiateCall(pc, userId);
            }
        });

        socket.on('room-count-update', ({ count }) => {
            updateCountUI(count);
        });

        async function initiateCall(pc, userId) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { target: userId, signal: { offer } });
        }

        socket.on('signal', async (data) => {
            let pc = peerConnections[data.sender];
            if (!pc) return;
            if (data.signal.answer) await pc.setRemoteDescription(new RTCSessionDescription(data.signal.answer));
            else if (data.signal.candidate) { try { await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate)); } catch(e){} }
        });

        socket.on('student-raised-hand', (studentId) => {
            const btn = document.getElementById(`mic-${studentId}`);
            const card = document.getElementById(`card-${studentId}`);
            const grid = document.getElementById('studentGrid');
            
            if (btn && studentMicStatus[studentId] !== 'unmuted') { 
                btn.innerText = "✋ Hand Raised"; 
                btn.className = "mic-control-btn hand-raised"; 
                if (card && grid) {
                    grid.prepend(card);
                }
            }
        });

        socket.on('single-student-unmuted-ui', (studentId) => {
            studentMicStatus[studentId] = 'unmuted';
            const btn = document.getElementById(`mic-${studentId}`);
            if (btn) { btn.innerText = "Live 🎙️"; btn.className = "mic-control-btn mic-on"; }
        });

        socket.on('single-student-muted-ui', (studentId) => {
            studentMicStatus[studentId] = 'muted';
            const btn = document.getElementById(`mic-${studentId}`);
            if (btn) { btn.innerText = "Muted 🔇"; btn.className = "mic-control-btn mic-off"; }
        });

        socket.on('all-students-muted-ui', () => {
            for (let userId in studentMicStatus) {
                studentMicStatus[userId] = 'muted';
                const btn = document.getElementById(`mic-${userId}`);
                if (btn) { btn.innerText = "Muted 🔇"; btn.className = "mic-control-btn mic-off"; }
            }
        });

        socket.on('all-students-unmuted-ui', () => {
            for (let userId in studentMicStatus) {
                studentMicStatus[userId] = 'unmuted';
                const btn = document.getElementById(`mic-${userId}`);
                if (btn) { btn.innerText = "Live 🎙️"; btn.className = "mic-control-btn mic-on"; }
            }
        });

        socket.on('user-left', (userId) => {
            if (peerConnections[userId]) peerConnections[userId].close();
            delete peerConnections[userId];
            delete studentMicStatus[userId];
            const card = document.getElementById(`card-${userId}`);
            if (card) card.remove();
        });

        function createPeerConnection(userId) {
            const pc = new RTCPeerConnection(servers);
            peerConnections[userId] = pc;
            studentMicStatus[userId] = 'muted'; 
            
            const currentStream = isScreenSharing ? screenStream : localStream;
            currentStream.getVideoTracks().forEach(track => pc.addTrack(track, currentStream));
            localStream.getAudioTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                if (document.getElementById(`card-${userId}`)) return;
                
                const grid = document.getElementById('studentGrid');
                const card = document.createElement('div');
                card.className = 'student-card';
                card.id = `card-${userId}`;

                const video = document.createElement('video');
                video.autoplay = true; video.playsInline = true;
                video.srcObject = event.streams[0];

                const label = document.createElement('div');
                label.className = 'student-label';
                label.innerText = `Student (${userId.substring(0,4)})`;

                const micBtn = document.createElement('button');
                micBtn.className = 'mic-control-btn mic-off';
                micBtn.id = `mic-${userId}`;
                micBtn.innerText = "Muted 🔇";
                
                micBtn.onclick = () => {
                    if (studentMicStatus[userId] === 'muted') {
                        socket.emit('allow-student', userId);
                    } else {
                        socket.emit('mute-student', userId);
                    }
                };

                card.appendChild(video);
                card.appendChild(label);
                card.appendChild(micBtn);
                grid.appendChild(card);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) socket.emit('signal', { target: userId, signal: { candidate: event.candidate } });
            };
            return pc;
        }
    </script>
</body>
</html>
